<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarpras Pesantren SKM V9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .category-pill {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .item-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .item-card:active {
            transform: scale(0.96);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-slate-900 pb-28">

    <!-- HEADER MEWAH V9 -->
    <header class="glass sticky top-0 z-50 px-6 py-6 border-b border-white/50">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tighter text-emerald-800 flex items-center gap-2">
                        <span class="bg-emerald-600 text-white p-2 rounded-2xl shadow-lg shadow-emerald-200">🏪</span> 
                        SARPRAS SKM
                    </h1>
                    <div id="status-label" class="flex items-center gap-1.5 mt-1">
                        <span class="w-2 h-2 rounded-full bg-slate-300 animate-pulse"></span>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Mode Tamu</span>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="openModal('modal-login')" class="w-12 h-12 glass flex items-center justify-center rounded-2xl shadow-sm text-slate-500 active:bg-white transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </button>
                    <button onclick="openModal('modal-cart')" class="w-12 h-12 bg-emerald-600 flex items-center justify-center rounded-2xl shadow-xl shadow-emerald-200 text-white relative active:scale-90 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 11V7a4 4 0 118 0m-4 5v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zM9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                        <span id="cart-count" class="hidden absolute -top-1 -right-1 bg-red-500 text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-white shadow-md">0</span>
                    </button>
                </div>
            </div>
            
            <div class="relative group">
                <input type="text" id="search-input" oninput="refreshKatalog()" placeholder="Cari alat atau bahan..." class="w-full p-5 pl-14 bg-white/50 border border-white rounded-[24px] text-sm font-semibold outline-none focus:ring-4 focus:ring-emerald-500/10 focus:bg-white transition-all shadow-inner">
                <svg class="w-6 h-6 absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-emerald-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>
    </header>

    <!-- KATEGORI BAR -->
    <div class="max-w-5xl mx-auto px-6 mt-6">
        <div id="category-list" class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
            <!-- Kategori akan muncul di sini -->
        </div>
    </div>

    <!-- MAIN TAB NAVIGATION -->
    <nav class="flex max-w-5xl mx-auto px-6 mt-4 gap-6 text-[11px] font-black uppercase tracking-[0.2em]">
        <button onclick="switchTab('katalog')" id="tab-btn-katalog" class="pb-3 border-b-4 border-emerald-600 text-emerald-800">Katalog</button>
        <button onclick="switchTab('riwayat')" id="tab-btn-riwayat" class="pb-3 border-b-4 border-transparent text-slate-400">Riwayat</button>
        <button onclick="switchTab('admin')" id="tab-btn-admin" class="hidden pb-3 border-b-4 border-transparent text-slate-400">Panel Petugas</button>
    </nav>

    <!-- CONTENT AREA -->
    <main class="max-w-5xl mx-auto px-6 py-6">
        
        <!-- KATALOG GRID -->
        <div id="content-katalog" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5 animate-slide-up">
            <!-- Item muncul di sini -->
        </div>

        <!-- RIWAYAT LIST -->
        <div id="content-riwayat" class="hidden space-y-4 animate-slide-up">
            <div class="bg-white rounded-[32px] border border-slate-100 shadow-sm overflow-hidden">
                <div id="history-container" class="divide-y divide-slate-50">
                    <!-- Riwayat muncul di sini -->
                </div>
            </div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="content-admin" class="hidden max-w-2xl mx-auto space-y-8 animate-slide-up">
            <div class="bg-white p-8 rounded-[40px] shadow-xl shadow-slate-200/50 border border-white">
                <h2 class="text-sm font-black uppercase tracking-widest text-emerald-600 mb-8 flex items-center gap-2">
                    <span class="w-8 h-8 bg-emerald-50 flex items-center justify-center rounded-full">📦</span> Tambah Sarpras Baru
                </h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Nama Barang</label>
                        <input type="text" id="add-nama" class="w-full mt-1 p-5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 transition-all font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Stok Awal</label>
                            <input type="number" id="add-stok" class="w-full mt-1 p-5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 transition-all font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Kategori</label>
                            <select id="add-kategori" class="w-full mt-1 p-5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 transition-all font-bold appearance-none">
                                <option>Sarana</option>
                                <option>Media</option>
                                <option>Kebersihan</option>
                                <option>Elektronik</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Foto Barang</label>
                        <div onclick="document.getElementById('file-upload').click()" class="mt-1 aspect-video border-2 border-dashed border-slate-200 rounded-[28px] flex flex-col items-center justify-center bg-slate-50 hover:bg-emerald-50 transition-all cursor-pointer overflow-hidden group">
                            <img id="preview-img" src="" class="hidden w-full h-full object-cover">
                            <div id="preview-placeholder" class="text-center">
                                <span class="text-3xl">📸</span>
                                <p class="text-[10px] font-extrabold text-slate-400 mt-2 uppercase">Klik untuk upload</p>
                            </div>
                        </div>
                        <input type="file" id="file-upload" class="hidden" accept="image/*" onchange="previewImage(this)">
                    </div>
                    <button onclick="saveItem()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black uppercase tracking-[0.2em] shadow-2xl shadow-slate-300 active:scale-95 transition-all">Simpan ke Cloud</button>
                </div>
            </div>
        </div>
    </main>

    <!-- LOGIN MODAL -->
    <div id="modal-login" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm p-10 rounded-[48px] text-center shadow-2xl animate-slide-up">
            <div class="w-20 h-20 bg-emerald-100 rounded-3xl flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner">🔐</div>
            <h2 class="text-2xl font-black tracking-tight mb-2">Akses Petugas</h2>
            <p class="text-[11px] font-bold text-slate-400 uppercase mb-10 tracking-widest">Gunakan PIN Default</p>
            <input type="password" id="pin-input" placeholder="••••" class="w-full p-6 bg-slate-100 rounded-3xl text-center text-4xl tracking-[12px] mb-8 outline-none border-2 border-transparent focus:border-emerald-500 font-mono transition-all">
            <div class="flex gap-4">
                <button onclick="closeModal('modal-login')" class="flex-1 py-4 text-slate-400 font-black uppercase text-xs">Batal</button>
                <button onclick="checkPin()" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg shadow-emerald-900/20">Masuk</button>
            </div>
        </div>
    </div>

    <!-- CART MODAL -->
    <div id="modal-cart" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex justify-end">
        <div class="bg-white/90 backdrop-blur-2xl w-full max-w-md h-full p-10 flex flex-col shadow-2xl animate-slide-up">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black tracking-tighter uppercase">Daftar Ambil</h2>
                <button onclick="closeModal('modal-cart')" class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-xl font-bold">✕</button>
            </div>
            <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar">
                <!-- List belanja -->
            </div>
            <div class="mt-10 space-y-4 pt-6 border-t border-slate-200">
                <input type="text" id="borrower-name" placeholder="Nama Pengambil?" class="w-full p-5 bg-white border border-slate-200 rounded-2xl outline-none font-bold text-lg shadow-sm">
                <button onclick="confirmTransaction()" class="w-full bg-emerald-600 text-white py-6 rounded-[28px] font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all text-sm">Proses Sekarang</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sarpras-skm-v9-stable';

        let state = {
            inventory: [],
            history: [],
            categories: ["Sarana", "Media", "Kebersihan", "Elektronik"],
            cart: [],
            isAdmin: false,
            activeCat: 'Semua',
            tempImage: ''
        };

        const dbRef = doc(db, 'artifacts', appId, 'public', 'data', 'v9Store');

        // FIREBASE LISTENER
        onSnapshot(dbRef, (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                state.inventory = data.inventory || [];
                state.history = data.history || [];
                state.categories = data.categories || state.categories;
                renderApp();
            } else {
                setDoc(dbRef, { inventory: [], history: [], categories: state.categories });
            }
        });

        // CORE RENDERING
        window.renderApp = () => {
            renderKatalog();
            renderCategories();
            renderHistory();
            updateCartBadge();
        };

        window.renderCategories = () => {
            const list = document.getElementById('category-list');
            list.innerHTML = '';
            ['Semua', ...state.categories].forEach(cat => {
                const isActive = state.activeCat === cat;
                const btn = document.createElement('button');
                btn.className = `category-pill px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap border transition-all ${isActive ? 'bg-emerald-600 text-white border-emerald-600 shadow-lg shadow-emerald-200' : 'bg-white text-slate-400 border-slate-100 hover:border-emerald-200'}`;
                btn.innerText = cat;
                btn.onclick = () => { state.activeCat = cat; renderApp(); };
                list.appendChild(btn);
            });
        };

        window.renderKatalog = () => {
            const grid = document.getElementById('content-katalog');
            const search = document.getElementById('search-input').value.toLowerCase();
            grid.innerHTML = '';

            const filtered = state.inventory.filter(item => 
                (state.activeCat === 'Semua' || item.kategori === state.activeCat) &&
                (item.nama.toLowerCase().includes(search))
            );

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'glass rounded-[32px] overflow-hidden flex flex-col item-card border border-white/80 shadow-sm relative';
                div.innerHTML = `
                    ${state.isAdmin ? `<button onclick="deleteItem(${item.id})" class="absolute top-3 right-3 z-10 w-9 h-9 bg-red-500 text-white rounded-xl shadow-lg flex items-center justify-center active:scale-90">🗑️</button>` : ''}
                    <div class="aspect-square bg-slate-200 overflow-hidden">
                        <img src="${item.foto || 'https://via.placeholder.com/300'}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <span class="text-[8px] font-black text-emerald-600 uppercase tracking-widest mb-1 opacity-60">${item.kategori}</span>
                        <h3 class="text-[11px] font-extrabold uppercase leading-tight h-8 mb-2 text-slate-800 line-clamp-2">${item.nama}</h3>
                        <div class="mt-auto flex justify-between items-center">
                            <span class="text-[10px] font-black ${item.stok <= 3 ? 'text-red-500 animate-pulse' : 'text-slate-400'} uppercase tracking-tighter">Stok: ${item.stok}</span>
                        </div>
                        <button onclick="addToCart(${item.id})" ${item.stok <= 0 ? 'disabled' : ''} class="mt-4 w-full bg-slate-900 text-white py-3 rounded-2xl text-[9px] font-black uppercase tracking-[0.1em] disabled:bg-slate-200 transition-all active:bg-emerald-600">Ambil</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        };

        window.renderHistory = () => {
            const container = document.getElementById('history-container');
            container.innerHTML = state.history.length ? '' : '<div class="p-20 text-center italic text-slate-300">Belum ada aktivitas pengambilan...</div>';
            state.history.slice(0, 50).forEach(log => {
                const div = document.createElement('div');
                div.className = 'p-5 flex justify-between items-center bg-white hover:bg-slate-50 transition-colors';
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-xl">📦</div>
                        <div>
                            <h4 class="text-[11px] font-black uppercase text-slate-800 leading-none mb-1">${log.barang}</h4>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">${log.waktu} • Oleh: <span class="text-emerald-600 font-extrabold">${log.user}</span></p>
                        </div>
                    </div>
                    <span class="bg-red-50 text-red-600 font-black text-xs px-3 py-1.5 rounded-full ring-1 ring-red-100">-${log.qty}</span>
                `;
                container.appendChild(div);
            });
        };

        // ACTIONS
        window.switchTab = (tab) => {
            ['katalog', 'riwayat', 'admin'].forEach(t => document.getElementById('content-'+t).classList.add('hidden'));
            ['katalog', 'riwayat', 'admin'].forEach(t => {
                document.getElementById('tab-btn-'+t).classList.replace('border-emerald-600', 'border-transparent');
                document.getElementById('tab-btn-'+t).classList.replace('text-emerald-800', 'text-slate-400');
            });

            document.getElementById('content-'+tab).classList.remove('hidden');
            document.getElementById('tab-btn-'+tab).classList.replace('border-transparent', 'border-emerald-600');
            document.getElementById('tab-btn-'+tab).classList.replace('text-slate-400', 'text-emerald-800');
        };

        window.openModal = (id) => {
            document.getElementById(id).classList.remove('hidden');
            if(id === 'modal-cart') renderCart();
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.checkPin = () => {
            const pin = document.getElementById('pin-input').value;
            if(pin === '1234') {
                state.isAdmin = true;
                document.getElementById('tab-btn-admin').classList.remove('hidden');
                document.getElementById('status-label').innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span><span class="text-[10px] font-black text-emerald-600 uppercase tracking-[0.2em]">Mode Petugas</span>`;
                closeModal('modal-login');
                renderApp();
            } else { alert('PIN Salah!'); }
        };

        window.previewImage = (input) => {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_W = 500;
                        const scale = MAX_W / img.width;
                        canvas.width = MAX_W;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        state.tempImage = canvas.toDataURL('image/jpeg', 0.6);
                        document.getElementById('preview-img').src = state.tempImage;
                        document.getElementById('preview-img').classList.remove('hidden');
                        document.getElementById('preview-placeholder').classList.add('hidden');
                    };
                };
                reader.readAsDataURL(file);
            }
        };

        window.saveItem = async () => {
            const nama = document.getElementById('add-nama').value;
            const stok = parseInt(document.getElementById('add-stok').value);
            const kategori = document.getElementById('add-kategori').value;
            if(!nama || isNaN(stok)) return alert('Lengkapi data!');

            const newItem = { id: Date.now(), nama, stok, kategori, foto: state.tempImage };
            await updateDoc(dbRef, { inventory: [...state.inventory, newItem] });
            
            // Reset
            document.getElementById('add-nama').value = '';
            document.getElementById('add-stok').value = '';
            document.getElementById('preview-img').classList.add('hidden');
            document.getElementById('preview-placeholder').classList.remove('hidden');
            state.tempImage = '';
            switchTab('katalog');
        };

        window.deleteItem = async (id) => {
            if(confirm('Hapus barang ini dari Cloud?')) {
                const filtered = state.inventory.filter(i => i.id !== id);
                await updateDoc(dbRef, { inventory: filtered });
            }
        };

        window.addToCart = (id) => {
            const item = state.inventory.find(i => i.id === id);
            const inCart = state.cart.find(c => c.id === id);
            if(inCart) {
                if(inCart.qty < item.stok) inCart.qty++;
            } else {
                state.cart.push({...item, qty: 1});
            }
            updateCartBadge();
        };

        window.updateCartBadge = () => {
            const badge = document.getElementById('cart-count');
            badge.innerText = state.cart.length;
            badge.classList.toggle('hidden', state.cart.length === 0);
        };

        window.renderCart = () => {
            const cont = document.getElementById('cart-content');
            cont.innerHTML = state.cart.length ? '' : '<div class="p-10 text-center italic text-slate-400">Keranjang masih kosong...</div>';
            state.cart.forEach((c, idx) => {
                cont.innerHTML += `
                    <div class="flex items-center gap-5 bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                        <img src="${c.foto || ''}" class="w-16 h-16 rounded-2xl object-cover bg-slate-100">
                        <div class="flex-grow">
                            <h4 class="text-xs font-black uppercase truncate w-32">${c.nama}</h4>
                            <p class="text-[11px] font-bold text-emerald-600 mt-1">Jumlah: ${c.qty}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="updateQty(${idx}, -1)" class="w-10 h-10 bg-slate-50 border rounded-xl font-bold active:bg-white">-</button>
                            <button onclick="updateQty(${idx}, 1)" class="w-10 h-10 bg-slate-50 border rounded-xl font-bold active:bg-white">+</button>
                        </div>
                    </div>
                `;
            });
        };

        window.updateQty = (idx, delta) => {
            const c = state.cart[idx];
            const original = state.inventory.find(i => i.id === c.id);
            c.qty += delta;
            if(c.qty <= 0) state.cart.splice(idx, 1);
            else if(c.qty > original.stok) c.qty = original.stok;
            renderCart();
            updateCartBadge();
        };

        window.confirmTransaction = async () => {
            const user = document.getElementById('borrower-name').value;
            if(!user || !state.cart.length) return alert('Lengkapi nama & barang!');

            const newInv = [...state.inventory];
            const logs = [];

            state.cart.forEach(c => {
                const idx = newInv.findIndex(i => i.id === c.id);
                newInv[idx].stok -= c.qty;
                logs.push({
                    barang: c.nama,
                    qty: c.qty,
                    user: user,
                    waktu: new Date().toLocaleString('id-ID', {hour12: false})
                });
            });

            await updateDoc(dbRef, { 
                inventory: newInv, 
                history: [...logs, ...state.history].slice(0, 100) 
            });

            state.cart = [];
            document.getElementById('borrower-name').value = '';
            closeModal('modal-cart');
            alert('Data berhasil dicatat!');
        };
        
        // GLOBAL SEARCH HANDLER
        window.refreshKatalog = () => renderKatalog();

    </script>
</body>
</html>
