<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarpras Pesantren</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#059669">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3067/3067451.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; color: #1f2937; -webkit-tap-highlight-color: transparent; }
        .product-card { transition: all 0.2s ease; border-radius: 20px; overflow: hidden; background: white; border: 1px solid #e5e7eb; }
        .product-card:active { transform: scale(0.95); }
        .img-box { width: 100%; aspect-ratio: 1/1; background-color: #f9fafb; overflow: hidden; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge-category { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); backdrop-filter: blur(4px); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; color: #065f46; border: 1px solid rgba(0,0,0,0.05); }
        .btn-primary { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        
        /* PWA Install Banner Style */
        #pwa-banner { display: none; position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 999; }
    </style>
</head>
<body class="pb-24">

    <!-- PWA Install Prompt -->
    <div id="pwa-banner" class="bg-gray-900 text-white p-4 rounded-2xl flex items-center justify-between shadow-2xl border border-white/10">
        <div class="flex items-center gap-3">
            <span class="text-2xl">📱</span>
            <div class="text-[11px]">
                <p class="font-bold">Pasang Aplikasi</p>
                <p class="text-gray-400">Akses lebih cepat dari beranda</p>
            </div>
        </div>
        <button onclick="installApp()" class="bg-emerald-500 px-4 py-2 rounded-xl text-xs font-black">INSTALL</button>
    </div>

    <!-- Header & Navigation -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold text-emerald-800 tracking-tight flex items-center gap-2">
                    <span>🔧</span> SARPRAS <span class="text-emerald-500 font-light text-[10px] bg-emerald-50 px-2 py-0.5 rounded-full">v7.0</span>
                </h1>
                <div id="admin-status" class="text-[10px] font-bold text-gray-400 mt-0.5 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-gray-300" id="status-dot"></span> 
                    <span id="status-text">Mode Tamu (Read-Only)</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="openLogin()" id="login-btn" class="p-2.5 bg-gray-100 rounded-2xl text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </button>
                <button onclick="toggleCart()" class="relative p-2.5 bg-emerald-50 rounded-2xl text-emerald-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <span id="cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] w-5 h-5 flex items-center justify-center rounded-full font-bold hidden border-2 border-white">0</span>
                </button>
            </div>
        </div>
        
        <div class="container mx-auto px-4 pb-3 space-y-3">
            <div class="relative">
                <input type="text" id="search-input" oninput="handleSearch()" placeholder="Cari barang atau kategori..." class="w-full pl-10 pr-4 py-3 bg-gray-100 rounded-2xl text-sm border-none focus:ring-2 focus:ring-emerald-500 outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3.5 top-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <div class="flex overflow-x-auto gap-2 no-scrollbar pb-1" id="category-chips"></div>
        </div>

        <!-- Tab Navbar -->
        <div class="container mx-auto px-4 flex gap-8 text-[11px] font-black uppercase tracking-wider border-t bg-white">
            <button onclick="switchTab('katalog')" id="t-katalog" class="py-4 border-b-4 border-emerald-600 text-emerald-700">Katalog</button>
            <button onclick="switchTab('riwayat')" id="t-riwayat" class="py-4 text-gray-400">Riwayat</button>
            <button onclick="switchTab('admin')" id="t-admin" class="py-4 text-gray-400 hidden">Admin Panel</button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <!-- Tab: Katalog -->
        <section id="s-katalog">
            <div id="katalog-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
            <div id="no-result" class="hidden text-center py-24">
                <p class="text-4xl mb-4">🌵</p>
                <p class="text-gray-400 font-bold">Barang tidak ditemukan.</p>
            </div>
        </section>

        <!-- Tab: Riwayat -->
        <section id="s-riwayat" class="hidden">
            <div class="bg-white rounded-[24px] shadow-sm border overflow-hidden">
                <div class="p-5 border-b bg-gray-50 flex justify-between items-center">
                    <h3 class="font-black text-gray-700 uppercase text-xs tracking-widest">Aktivitas Terakhir</h3>
                    <button onclick="clearHistory()" id="clear-history-btn" class="hidden text-[10px] bg-red-50 text-red-500 px-3 py-1 rounded-full font-bold">Hapus Semua</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-50 text-[9px] uppercase font-black text-gray-400 tracking-widest border-b">
                            <tr>
                                <th class="p-5">Tanggal</th>
                                <th class="p-5">Barang</th>
                                <th class="p-5 text-center">Qty</th>
                                <th class="p-5">Pemakai</th>
                            </tr>
                        </thead>
                        <tbody id="riwayat-list" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Tab: Admin Panel -->
        <section id="s-admin" class="hidden max-w-xl mx-auto space-y-6">
            <!-- Manage Categories -->
            <div class="bg-white p-6 rounded-[32px] border shadow-sm">
                <h2 class="text-sm font-black mb-4 uppercase tracking-widest text-indigo-600 flex items-center gap-2">
                    <span class="w-6 h-6 bg-indigo-50 flex items-center justify-center rounded-lg">📂</span> Kelola Kelompok
                </h2>
                <div class="flex gap-2">
                    <input type="text" id="new-cat-input" placeholder="Nama kelompok baru..." class="flex-grow p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
                    <button onclick="addNewCategory()" class="px-6 bg-indigo-600 text-white font-bold rounded-2xl">Tambah</button>
                </div>
                <div class="flex flex-wrap gap-2 mt-4" id="manage-cats-list"></div>
            </div>

            <!-- Add Item -->
            <div class="bg-white p-6 rounded-[32px] border shadow-sm">
                <h2 class="text-sm font-black mb-6 uppercase tracking-widest text-emerald-600 flex items-center gap-2">
                    <span class="w-6 h-6 bg-emerald-50 flex items-center justify-center rounded-lg">➕</span> Tambah Barang
                </h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Nama Barang</label>
                                <input type="text" id="add-nama" class="w-full mt-1 p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Stok</label>
                                    <input type="number" id="add-stok" class="w-full mt-1 p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Kelompok</label>
                                    <select id="add-kategori" class="w-full mt-1 p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none appearance-none"></select>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Foto Barang</label>
                            <label for="file-input" class="mt-1 flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-200 rounded-[24px] cursor-pointer bg-gray-50 hover:bg-emerald-50 transition relative overflow-hidden">
                                <div id="preview-wrapper" class="absolute inset-0 hidden">
                                    <img id="image-preview" class="w-full h-full object-cover">
                                    <button onclick="resetImage(event)" class="absolute top-2 right-2 bg-red-500 text-white text-[8px] px-2 py-1 rounded-full font-bold">HAPUS</button>
                                </div>
                                <div id="upload-hint" class="text-center p-4">
                                    <p class="text-2xl mb-1">📸</p>
                                    <p class="text-[9px] font-bold text-gray-400 uppercase">Ambil Foto</p>
                                </div>
                                <input id="file-input" type="file" accept="image/*" class="hidden" onchange="processImage(this)" />
                            </label>
                        </div>
                    </div>
                    <button onclick="addItem()" class="w-full btn-primary text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg shadow-emerald-100">Simpan Barang</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Side Panel: Checkout -->
    <div id="cart-panel" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex justify-end">
        <div class="bg-white w-full max-w-sm h-full p-6 flex flex-col modal-animate">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black">📋 List Pakai</h2>
                <button onclick="toggleCart()" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full text-lg">✕</button>
            </div>
            <div id="cart-list" class="flex-grow space-y-4 overflow-y-auto no-scrollbar"></div>
            <div class="mt-6 border-t pt-6 space-y-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase">Siapa yang pakai?</label>
                    <input type="text" id="user-name" placeholder="Nama Santri / Pengurus" class="w-full mt-1.5 p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                </div>
                <button onclick="submitUsage()" class="w-full btn-primary text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl">Konfirmasi</button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs p-8 rounded-[40px] text-center modal-animate">
            <div class="w-20 h-20 bg-emerald-50 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-6">🔐</div>
            <h2 class="text-lg font-black mb-2">Login Petugas</h2>
            <p class="text-[10px] text-gray-400 mb-8 uppercase font-bold tracking-widest">Akses Manajemen Barang</p>
            <input type="password" id="pin-input" class="w-full p-5 bg-gray-100 rounded-2xl text-center text-2xl tracking-[15px] mb-8 outline-none border-2 border-transparent focus:border-emerald-500 transition" placeholder="••••">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeLogin()" class="p-4 bg-gray-100 rounded-2xl font-bold text-gray-400 text-xs uppercase">Batal</button>
                <button onclick="verifyLogin()" class="p-4 btn-primary text-white rounded-2xl font-bold text-xs uppercase">Masuk</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900/95 text-white px-6 py-3 rounded-full text-[11px] font-bold hidden z-[300] shadow-2xl flex items-center gap-2"></div>

    <script>
        // --- State ---
        let categories = JSON.parse(localStorage.getItem('v7_cats')) || ["Sarana", "Media", "Perpustakaan", "Kesenian", "Kebersihan", "Kemesjidan", "KDK", "Poskestren"];
        let inventory = JSON.parse(localStorage.getItem('v7_db')) || [];
        let history = JSON.parse(localStorage.getItem('v7_hist')) || [];
        let cart = [];
        let activeCategory = "Semua";
        let isAdmin = false;
        let tempBase64 = "";
        const PIN = "1234";

        // --- PWA Helper ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-banner').style.display = 'flex';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('pwa-banner').style.display = 'none';
                }
                deferredPrompt = null;
            }
        }

        // --- Init ---
        function init() {
            renderChips();
            renderCategorySelect();
            renderKatalog();
            updateAdminUI();
        }

        function switchTab(t) {
            ['katalog', 'riwayat', 'admin'].forEach(tab => {
                document.getElementById('s-' + tab).classList.add('hidden');
                document.getElementById('t-' + tab).className = "py-4 text-gray-400 font-black uppercase tracking-wider";
            });
            document.getElementById('s-' + t).classList.remove('hidden');
            document.getElementById('t-' + t).className = "py-4 border-b-4 border-emerald-600 text-emerald-700 font-black uppercase tracking-wider";
            if(t === 'riwayat') renderRiwayat();
        }

        // --- Security ---
        function openLogin() {
            if(isAdmin) {
                isAdmin = false;
                updateAdminUI();
                showToast("🔓 Log Out Berhasil");
            } else {
                document.getElementById('login-modal').classList.remove('hidden');
                document.getElementById('pin-input').focus();
            }
        }
        function closeLogin() { document.getElementById('login-modal').classList.add('hidden'); }
        function verifyLogin() {
            if(document.getElementById('pin-input').value === PIN) {
                isAdmin = true;
                updateAdminUI();
                closeLogin();
                document.getElementById('pin-input').value = "";
                showToast("✅ Welcome Admin");
            } else {
                showToast("❌ PIN Salah");
            }
        }
        function updateAdminUI() {
            const el = {
                tab: document.getElementById('t-admin'),
                dot: document.getElementById('status-dot'),
                txt: document.getElementById('status-text'),
                btn: document.getElementById('login-btn'),
                clr: document.getElementById('clear-history-btn')
            };
            if(isAdmin) {
                el.tab.classList.remove('hidden');
                el.dot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]";
                el.txt.innerText = "Mode Petugas";
                el.btn.className = "p-2.5 bg-emerald-100 rounded-2xl text-emerald-700";
                el.clr.classList.remove('hidden');
            } else {
                el.tab.classList.add('hidden');
                el.dot.className = "w-2 h-2 rounded-full bg-gray-300";
                el.txt.innerText = "Mode Tamu (Read-Only)";
                el.btn.className = "p-2.5 bg-gray-100 rounded-2xl text-gray-600";
                el.clr.classList.add('hidden');
                if(!document.getElementById('s-admin').classList.contains('hidden')) switchTab('katalog');
            }
        }

        // --- Categories ---
        function renderChips() {
            const container = document.getElementById('category-chips');
            const list = ["Semua", ...categories];
            container.innerHTML = list.map(c => `
                <button onclick="filterCat('${c}')" class="px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${activeCategory === c ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-200' : 'bg-white text-gray-400 border border-gray-100'}">
                    ${c}
                </button>
            `).join('');
            
            const manager = document.getElementById('manage-cats-list');
            manager.innerHTML = categories.map(c => `
                <div class="flex items-center gap-2 bg-gray-50 border px-3 py-1.5 rounded-xl">
                    <span class="text-[10px] font-black text-gray-500 uppercase">${c}</span>
                    <button onclick="deleteCategory('${c}')" class="text-red-400 font-bold ml-1 text-xs">✕</button>
                </div>
            `).join('');
        }

        function filterCat(c) {
            activeCategory = c;
            renderChips();
            renderKatalog();
        }

        function addNewCategory() {
            const val = document.getElementById('new-cat-input').value.trim();
            if(!val || categories.includes(val)) return;
            categories.push(val);
            save();
            renderChips();
            renderCategorySelect();
            document.getElementById('new-cat-input').value = "";
            showToast("✨ Kelompok '" + val + "' Ditambahkan");
        }

        function deleteCategory(c) {
            if(confirm("Hapus kategori ini?")) {
                categories = categories.filter(x => x !== c);
                save();
                renderChips();
                renderCategorySelect();
            }
        }

        function renderCategorySelect() {
            const s = document.getElementById('add-kategori');
            s.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        // --- Catalog ---
        function renderKatalog(q = "") {
            const grid = document.getElementById('katalog-grid');
            const no = document.getElementById('no-result');
            grid.innerHTML = '';
            
            let filtered = inventory;
            if(activeCategory !== "Semua") filtered = filtered.filter(i => i.kategori === activeCategory);
            if(q) filtered = filtered.filter(i => i.nama.toLowerCase().includes(q.toLowerCase()));

            if(filtered.length === 0) no.classList.remove('hidden');
            else {
                no.classList.add('hidden');
                filtered.forEach(item => {
                    grid.innerHTML += `
                        <div class="product-card flex flex-col shadow-sm">
                            <div class="img-box">
                                <span class="badge-category uppercase">${item.kategori}</span>
                                <img src="${item.foto}" onerror="this.src='https://via.placeholder.com/400?text=No+Photo'">
                            </div>
                            <div class="p-4 flex flex-col flex-grow">
                                <h3 class="text-[10px] font-black text-gray-800 line-clamp-2 h-7 leading-tight mb-2 uppercase tracking-tight">${item.nama}</h3>
                                <div class="text-[10px] font-black ${item.stok === 0 ? 'text-red-500' : 'text-emerald-600'}">
                                    STOK: ${item.stok}
                                </div>
                                <button onclick="addToCart(${item.id})" class="mt-4 w-full bg-emerald-50 text-emerald-700 text-[9px] font-black py-3 rounded-xl uppercase tracking-widest active:scale-95 transition">Pakai</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        function addItem() {
            const n = document.getElementById('add-nama').value;
            const s = parseInt(document.getElementById('add-stok').value);
            const k = document.getElementById('add-kategori').value;
            if(!n || isNaN(s)) return showToast("⚠️ Isi Nama & Stok");
            
            inventory.push({
                id: Date.now(),
                nama: n,
                stok: s,
                kategori: k,
                foto: tempBase64 || 'https://via.placeholder.com/400?text=Barang'
            });
            save();
            resetForm();
            switchTab('katalog');
            showToast("✅ Barang Berhasil Disimpan");
        }

        function resetForm() {
            document.getElementById('add-nama').value = "";
            document.getElementById('add-stok').value = "";
            resetImage();
        }

        // --- Utils & Handlers ---
        function processImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const max = 400;
                        const scale = max / Math.max(img.width, img.height);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        tempBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        document.getElementById('image-preview').src = tempBase64;
                        document.getElementById('preview-wrapper').classList.remove('hidden');
                        document.getElementById('upload-hint').classList.add('hidden');
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function resetImage(e) {
            if(e) e.preventDefault();
            tempBase64 = "";
            document.getElementById('preview-wrapper').classList.add('hidden');
            document.getElementById('upload-hint').classList.remove('hidden');
            document.getElementById('file-input').value = "";
        }

        function addToCart(id) {
            const item = inventory.find(i => i.id === id);
            if(item.stok <= 0) return showToast("❌ Stok Habis");
            
            const existing = cart.find(c => c.id === id);
            if(existing) {
                if(existing.qty < item.stok) existing.qty++;
                else return showToast("⚠️ Stok Maksimum");
            } else {
                cart.push({...item, qty: 1});
            }
            updateCartUI();
            showToast("🛒 Ditambah ke List");
        }

        function updateCartUI() {
            const b = document.getElementById('cart-badge');
            b.innerText = cart.length;
            b.classList.toggle('hidden', cart.length === 0);
            
            const l = document.getElementById('cart-list');
            l.innerHTML = cart.length === 0 ? '<div class="text-center py-20 text-gray-300 font-bold uppercase text-[10px] tracking-widest">Kosong</div>' : '';
            cart.forEach((c, i) => {
                l.innerHTML += `
                    <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-3xl border border-gray-100">
                        <img src="${c.foto}" class="w-12 h-12 object-cover rounded-2xl">
                        <div class="flex-grow">
                            <h4 class="text-[10px] font-black uppercase leading-tight">${c.nama}</h4>
                            <p class="text-[9px] font-bold text-gray-400">JUMLAH: ${c.qty}</p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="adjQty(${i}, -1)" class="w-7 h-7 bg-white rounded-lg border font-bold text-xs">-</button>
                            <button onclick="adjQty(${i}, 1)" class="w-7 h-7 bg-white rounded-lg border font-bold text-xs">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function adjQty(idx, v) {
            const inv = inventory.find(x => x.id === cart[idx].id);
            if(v === 1 && cart[idx].qty >= inv.stok) return;
            cart[idx].qty += v;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCartUI();
        }

        function submitUsage() {
            const user = document.getElementById('user-name').value;
            if(!user || cart.length === 0) return showToast("⚠️ Nama pemakai belum diisi");
            
            cart.forEach(c => {
                const item = inventory.find(i => i.id === c.id);
                item.stok -= c.qty;
                history.unshift({
                    tgl: new Date().toLocaleString('id-ID', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}),
                    nama: item.nama,
                    qty: c.qty,
                    user: user
                });
            });
            
            cart = [];
            document.getElementById('user-name').value = "";
            save();
            updateCartUI();
            toggleCart();
            renderKatalog();
            showToast("✅ Berhasil Dilaporkan");
        }

        function renderRiwayat() {
            const l = document.getElementById('riwayat-list');
            l.innerHTML = history.length ? '' : '<tr><td colspan="4" class="p-10 text-center text-gray-400 font-bold uppercase text-[10px]">Belum ada aktivitas</td></tr>';
            history.forEach(h => {
                l.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-5 text-[9px] text-gray-400 font-bold">${h.tgl}</td>
                        <td class="p-5 font-black text-gray-700 uppercase text-[10px]">${h.nama}</td>
                        <td class="p-5 text-center font-black text-red-500 text-[10px]">-${h.qty}</td>
                        <td class="p-5 font-bold text-gray-500 uppercase text-[10px]">${h.user}</td>
                    </tr>
                `;
            });
        }

        function clearHistory() {
            if(confirm("Hapus semua riwayat pemakaian?")) {
                history = [];
                save();
                renderRiwayat();
                showToast("🗑️ Riwayat Dihapus");
            }
        }

        function save() {
            localStorage.setItem('v7_cats', JSON.stringify(categories));
            localStorage.setItem('v7_db', JSON.stringify(inventory));
            localStorage.setItem('v7_hist', JSON.stringify(history));
        }

        function handleSearch() { renderKatalog(document.getElementById('search-input').value); }
        function toggleCart() { document.getElementById('cart-panel').classList.toggle('hidden'); }
        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
