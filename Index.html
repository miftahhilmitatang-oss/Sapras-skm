<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARPRAS SKM - Cloud System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-up { animation: slide-up 0.4s ease-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-24">

    <header class="bg-white border-b sticky top-0 z-40 px-4 py-4 shadow-sm">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-black text-emerald-700 tracking-tighter flex items-center gap-2">
                    <span class="bg-emerald-100 p-1.5 rounded-lg text-lg">🏪</span> SARPRAS SKM
                </h1>
                <p id="admin-status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">
                    ⚪ MODE TAMU (LIHAT SAJA)
                </p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleModal('login-modal')" class="p-2.5 bg-slate-100 text-slate-500 rounded-2xl transition hover:bg-emerald-100">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </button>
                <button onclick="toggleModal('cart-modal')" class="relative p-2.5 bg-emerald-600 text-white rounded-2xl shadow-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <span id="cart-count" class="hidden absolute -top-1 -right-1 bg-red-500 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
                </button>
            </div>
        </div>
        <input type="text" id="search-input" placeholder="Cari alat atau bahan..." class="w-full p-3.5 bg-slate-100 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-emerald-500 border-none">
    </header>

    <nav class="flex px-4 bg-white border-b text-[11px] font-black uppercase tracking-widest sticky top-[135px] z-30">
        <button onclick="switchTab('katalog')" id="tab-katalog" class="flex-1 py-4 border-b-4 border-emerald-600 text-emerald-700">📦 Katalog</button>
        <button onclick="switchTab('riwayat')" id="tab-riwayat" class="flex-1 py-4 border-b-4 border-transparent text-slate-300">📜 Riwayat</button>
        <button onclick="switchTab('admin')" id="tab-admin" class="hidden flex-1 py-4 border-b-4 border-transparent text-slate-300">➕ Kelola</button>
    </nav>

    <main class="p-4 max-w-5xl mx-auto">
        <div id="section-katalog" class="grid grid-cols-2 md:grid-cols-4 gap-4 animate-up">
            <p class="col-span-full text-center py-10 text-slate-400 italic">Memuat data inventaris...</p>
        </div>

        <div id="section-riwayat" class="hidden space-y-4 animate-up">
            <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                <div id="history-list" class="divide-y divide-slate-100">
                    </div>
            </div>
        </div>

        <div id="section-admin" class="hidden max-w-2xl mx-auto space-y-6 animate-up">
            <div class="bg-white p-6 rounded-[32px] border shadow-sm">
                <h2 class="text-sm font-black mb-6 uppercase text-emerald-600">➕ Tambah Barang Baru</h2>
                <div class="space-y-4">
                    <input type="text" id="add-nama" placeholder="Nama Barang" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="add-stok" placeholder="Stok" class="p-4 bg-slate-50 border rounded-2xl outline-none">
                        <select id="add-kategori" class="p-4 bg-slate-50 border rounded-2xl outline-none">
                            <option>Sarana</option><option>Media</option><option>Perpustakaan</option><option>Kebersihan</option>
                        </select>
                    </div>
                    <div id="photo-preview" class="w-full h-40 border-2 border-dashed rounded-2xl flex items-center justify-center bg-slate-50 cursor-pointer overflow-hidden">
                        <span class="text-slate-400 text-xs font-bold">KLIK UNTUK UNGGAH FOTO</span>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                    <button id="btn-save" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">SIMPAN KE DATABASE</button>
                </div>
            </div>
        </div>
    </main>

    <div id="login-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm p-8 rounded-[40px] text-center shadow-2xl">
            <div class="text-4xl mb-4">🔐</div>
            <h2 class="text-lg font-black mb-8 uppercase">Login Petugas</h2>
            <input type="password" id="pin-input" placeholder="••••" class="w-full p-5 bg-slate-100 rounded-3xl text-center text-3xl tracking-[12px] mb-8 outline-none border-2 focus:border-emerald-500 font-mono">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="toggleModal('login-modal')" class="p-4 bg-slate-100 rounded-2xl font-black text-[10px] text-slate-400">BATAL</button>
                <button onclick="handleLogin()" class="p-4 bg-emerald-600 text-white rounded-2xl font-black text-[10px]">MASUK</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-6 flex flex-col animate-slide-left">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black uppercase">📋 Daftar Ambil</h2>
                <button onclick="toggleModal('cart-modal')" class="text-slate-400 font-bold">✕</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4">
                </div>
            <div class="mt-6 border-t pt-6 space-y-4">
                <input type="text" id="taker-name" placeholder="Siapa yang mengambil?" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold">
                <button onclick="confirmUsage()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl">KONFIRMASI SEKARANG</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, runTransaction, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "MASUKKAN_API_KEY_ANDA",
            authDomain: "PROYEK-ANDA.firebaseapp.com",
            projectId: "PROYEK-ANDA",
            storageBucket: "PROYEK-ANDA.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "sarpras-pesantren-skm";

        // State Global
        let inventory = [];
        let cart = [];
        let isAdmin = false;
        let base64Photo = "";

        // --- AUTH & LOAD DATA ---
        signInAnonymously(auth).then(() => {
            // Load Inventory (Real-time)
            onSnapshot(query(collection(db, 'artifacts', appId, 'inventory'), orderBy('nama')), (snap) => {
                inventory = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderKatalog();
            });

            // Load History (Real-time)
            onSnapshot(query(collection(db, 'artifacts', appId, 'history'), orderBy('timestamp', 'desc'), limit(50)), (snap) => {
                const logs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderHistory(logs);
            });
        });

        // --- RENDER FUNCTIONS ---
        window.renderKatalog = () => {
            const container = document.getElementById('section-katalog');
            const search = document.getElementById('search-input').value.toLowerCase();
            
            container.innerHTML = inventory
                .filter(i => i.nama.toLowerCase().includes(search))
                .map(item => `
                    <div class="bg-white rounded-[24px] border overflow-hidden flex flex-col shadow-sm relative group">
                        ${isAdmin ? `<button onclick="deleteItem('${item.id}')" class="absolute top-2 right-2 z-10 p-2 bg-red-500 text-white rounded-xl">✕</button>` : ''}
                        <div class="aspect-square bg-slate-50">
                            <img src="${item.foto || 'https://via.placeholder.com/200'}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-3">
                            <h3 class="text-[11px] font-extrabold uppercase truncate">${item.nama}</h3>
                            <p class="text-[10px] font-black ${item.stok <= 3 ? 'text-red-500' : 'text-emerald-500'}">STOK: ${item.stok}</p>
                            <button onclick="addToCart('${item.id}')" ${item.stok <= 0 ? 'disabled' : ''} class="mt-3 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[9px] font-black uppercase disabled:bg-slate-200">PAKAI</button>
                        </div>
                    </div>
                `).join('');
        };

        function renderHistory(logs) {
            const container = document.getElementById('history-list');
            if (logs.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-slate-300 italic text-sm">Belum ada aktivitas.</div>`;
                return;
            }
            container.innerHTML = logs.map(log => `
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <h4 class="text-[11px] font-black text-slate-700 uppercase">${log.nama}</h4>
                        <p class="text-[9px] text-slate-400 font-bold uppercase">${log.tgl} • Oleh: ${log.user}</p>
                    </div>
                    <span class="bg-red-50 text-red-600 font-black text-xs px-3 py-1 rounded-full">-${log.qty}</span>
                </div>
            `).join('');
        }

        // --- CORE LOGIC ---
        window.addToCart = (id) => {
            const item = inventory.find(i => i.id === id);
            const inCart = cart.find(c => c.id === id);
            if (inCart) {
                if (inCart.qty < item.stok) inCart.qty++;
            } else {
                cart.push({ ...item, qty: 1 });
            }
            updateCartUI();
        };

        function updateCartUI() {
            const count = cart.reduce((acc, curr) => acc + curr.qty, 0);
            const badge = document.getElementById('cart-count');
            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);
            
            document.getElementById('cart-items').innerHTML = cart.map((item, idx) => `
                <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-[24px] border border-slate-100">
                    <div class="flex-grow">
                        <h4 class="text-[11px] font-black uppercase">${item.nama}</h4>
                        <p class="text-[10px] font-bold text-emerald-600">JUMLAH: ${item.qty}</p>
                    </div>
                    <button onclick="removeFromCart(${idx})" class="w-8 h-8 bg-white border rounded-lg font-bold">-</button>
                </div>
            `).join('');
        }

        window.removeFromCart = (idx) => {
            if (cart[idx].qty > 1) cart[idx].qty--;
            else cart.splice(idx, 1);
            updateCartUI();
        };

        window.confirmUsage = async () => {
            const name = document.getElementById('taker-name').value;
            if (!name || cart.length === 0) return alert("Isi nama dan pilih barang!");

            try {
                await runTransaction(db, async (transaction) => {
                    for (const item of cart) {
                        const ref = doc(db, 'artifacts', appId, 'inventory', item.id);
                        const snap = await transaction.get(ref);
                        const newStok = snap.data().stok - item.qty;
                        if (newStok < 0) throw "Stok tidak cukup!";
                        
                        transaction.update(ref, { stok: newStok });
                        const histRef = doc(collection(db, 'artifacts', appId, 'history'));
                        transaction.set(histRef, {
                            nama: item.nama, qty: item.qty, user: name,
                            timestamp: serverTimestamp(), tgl: new Date().toLocaleString('id-ID')
                        });
                    }
                });
                cart = [];
                updateCartUI();
                toggleModal('cart-modal');
                alert("Berhasil dicatat!");
            } catch (e) { alert(e); }
        };

        // --- ADMIN FUNCTIONS ---
        window.handleLogin = () => {
            const pin = document.getElementById('pin-input').value;
            if (pin === "1234") {
                isAdmin = true;
                document.getElementById('tab-admin').classList.remove('hidden');
                document.getElementById('admin-status').innerText = "🟢 MODE PETUGAS (CLOUD)";
                toggleModal('login-modal');
                renderKatalog();
            } else { alert("PIN Salah!"); }
        };

        window.deleteItem = async (id) => {
            if (confirm("Hapus barang?")) await deleteDoc(doc(db, 'artifacts', appId, 'inventory', id));
        };

        document.getElementById('btn-save').onclick = async () => {
            const nama = document.getElementById('add-nama').value;
            const stok = document.getElementById('add-stok').value;
            const kategori = document.getElementById('add-kategori').value;
            
            if (!nama || !stok) return alert("Lengkapi data!");
            
            await addDoc(collection(db, 'artifacts', appId, 'inventory'), {
                nama, kategori, stok: parseInt(stok), foto: base64Photo, createdAt: serverTimestamp()
            });
            
            document.getElementById('add-nama').value = "";
            document.getElementById('add-stok').value = "";
            base64Photo = "";
            document.getElementById('photo-preview').innerHTML = `<span class="text-slate-400 text-xs font-bold">KLIK UNTUK UNGGAH FOTO</span>`;
            switchTab('katalog');
        };
